<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول أو إنشاء حساب</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 30px;
            font-size: 16px;
        }
        button {
            background: #f39c12;
            color: #1e2a3e;
            padding: 12px;
            border: none;
            border-radius: 30px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .note {
            margin-top: 20px;
            font-size: 13px;
            color: gray;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>🔐 تسجيل الدخول / إنشاء حساب</h2>
    <p>أدخل بريدك الإلكتروني وكلمة سر (أي كلمة سر)</p>
    <input type="email" id="email" placeholder="بريدك الإلكتروني" autocomplete="off">
    <input type="password" id="password" placeholder="كلمة السر (أي شيء)">
    <button id="loginBtn">دخول / إنشاء حساب</button>
    <div class="note">
        ⚠️ حساب مجاني: يظهر لك امتحان أو اثنين فقط.<br>
        ✨ الاشتراك المدفوع: يفتح لك كل الامتحانات لمدة شهر أو شهرين.
    </div>
</div>

<script>
    document.getElementById("loginBtn").addEventListener("click", function() {
        let email = document.getElementById("email").value.trim();
        let password = document.getElementById("password").value.trim();
        
        if(email === "" || password === "") {
            alert("يرجى إدخال الإيميل وكلمة السر");
            return;
        }

        // حفظ بيانات تسجيل الدخول في localStorage
        localStorage.setItem("loggedInEmail", email);
        localStorage.setItem("loggedInPass", password);
        
        // هنا في المستقبل سنتحقق من الصلاحية عبر ملف JSON أو قاعدة بيانات
        // حالياً: نعتبر كل الحسابات مجانية حتى تفعلها يدوياً

        alert(`✅ تم تسجيل الدخول بنجاح كـ: ${email}\nالآن أنت في الوضع المجاني (امتحانان فقط). للاشتراك اضغط زر "اشتراك" في الصفحة الرئيسية.`);
        
        // العودة للصفحة الرئيسية
        window.location.href = "index.html";
    });
</script>
</body>
</html>
