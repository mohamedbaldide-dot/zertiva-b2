<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zertiva B2</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}
.page{display:none;min-height:100vh;padding:30px;}
.active{display:block;}
.home{display:flex;justify-content:center;align-items:center;text-align:center;}
.card{background:white;padding:40px;border-radius:15px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
button{padding:12px 20px;border:none;background:black;color:white;border-radius:10px;cursor:pointer;margin-top:10px;}
.item{background:white;padding:15px;margin-bottom:10px;border-radius:10px;cursor:pointer;}
.item:hover{background:#eee;}
.exam-box{background:white;padding:20px;border-radius:10px;}
</style>
</head>

<body>

<!-- الصفحة 1 -->
<div id="home" class="page active home">
  <div class="card">
    <h1>Zertiva B2</h1>
    <p>أوثق منصة للتحضير لامتحان Telc B2</p>
    <button onclick="goList()">لنبدأ 🚀</button>
  </div>
</div>

<!-- الصفحة 2 -->
<div id="list" class="page">
  <h2>الامتحانات</h2>
  <div id="examList"></div>
  <button onclick="goHome()">رجوع</button>
</div>

<!-- الصفحة 3 -->
<div id="exam" class="page">
  <div class="exam-box">
    <h2 id="examTitle">امتحان</h2>
    <p id="examType"></p>
    <button onclick="goList()">رجوع</button>
  </div>
</div>

<script>

// ================== الامتحانات ==================

  { id: 7, title: "tanzkurs (معدل)", base: 4, type: "mod" },

  { id: 8, title: "insell (أساسي)", base: 5, type: "base" },
  { id: 9, title: "insell (معدل)", base: 5, type: "mod" },

  { id: 10, title: "Bilder (أساسي)", base: 6, type: "base" },

  { id: 12, title: "Österreich (أساسي)", base: 8, type: "base" },

  { id: 13, title: "Insekten (أساسي)", base: 9, type: "base" },
  { id: 14, title: "Insekten (معدل)", base: 9, type: "mod" },

  { id: 15, title: "das Benzin (أساسي)", base: 10, type: "base" },

  { id: 16, title: "kaffee (أساسي)", base: 11, type: "base" },

  { id: 22, title: "Bonbons (أساسي)", base: 15, type: "base" },

  { id: 45, title: "Farben (أساسي)", base: 30, type: "base" }
];

// ================== عرض القائمة ==================
function renderList(){
  let container = document.getElementById("examList");
  container.innerHTML = "";

  exams.forEach(exam => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = exam.id + " - " + exam.title;

    div.onclick = function(){
      openExam(exam);
    };

    container.appendChild(div);
  });
}

// ================== التنقل ==================
function goList(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("exam").classList.remove("active");
  document.getElementById("list").classList.add("active");
  renderList();
}

function goHome(){
  document.getElementById("list").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

// ================== فتح الامتحان ==================
function openExam(exam){

  document.getElementById("list").classList.remove("active");
  document.getElementById("exam").classList.add("active");

  document.getElementById("examTitle").innerText = exam.title;

  if(exam.type === "base"){
    document.getElementById("examType").innerText = "📘 امتحان أساسي";
  } else {
    document.getElementById("examType").innerText = "✏️ امتحان معدل";
  }

}

</script>

</body>
</html>
