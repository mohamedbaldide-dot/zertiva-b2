<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zertiva B2 - أشهر منصة للتحضير لامتحان Telc B2</title>
<link rel="stylesheet" href="style.css">
<style>
    .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: white;
        border-bottom: 2px solid #e2e8f0;
        direction: rtl;
        position: sticky;
        top: 0;
        z-index: 100;
    }
    .logo-area {
        font-size: 24px;
        font-weight: bold;
        background: linear-gradient(135deg, #2b5876, #4e4376);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }
    .nav-buttons-area {
        display: flex;
        gap: 12px;
    }
    .btn-login-nav {
        padding: 8px 20px;
        border: 2px solid #2b5876;
        background: transparent;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        color: #2b5876;
    }
    .btn-login-nav:hover {
        background: #2b5876;
        color: white;
    }
    .btn-subscribe-nav {
        padding: 8px 20px;
        background: #f39c12;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        color: #1e2a3e;
    }
    .btn-subscribe-nav:hover {
        background: #e67e22;
        transform: scale(1.02);
    }
    
    .login-popup {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.6);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    .login-popup-content {
        background: white;
        padding: 35px;
        border-radius: 25px;
        width: 380px;
        text-align: center;
        direction: rtl;
        box-shadow: 0 25px 45px rgba(0,0,0,0.2);
    }
    .login-popup-content h3 {
        color: #2b5876;
        margin-bottom: 10px;
    }
    .login-popup-content input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 30px;
        border: 1px solid #ccc;
        font-size: 15px;
    }
    .btn-popup-login {
        background: linear-gradient(135deg, #2b5876, #4e4376);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 30px;
        width: 95%;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
    }
    .btn-popup-close {
        background: #ccc;
        border: none;
        padding: 8px 20px;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 12px;
    }
    
    .whatsapp-float {
        position: fixed;
        bottom: 25px;
        left: 25px;
        background: #25D366;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.25);
        z-index: 999;
        transition: 0.3s;
    }
    .whatsapp-float:hover {
        transform: scale(1.08);
    }
    .whatsapp-float span {
        color: white;
        font-size: 30px;
    }
</style>
</head>
<body>

<div class="nav-bar">
    <div class="logo-area">🎓 Zertiva B2</div>
    <div class="nav-buttons-area">
        <button id="navLoginBtn" class="btn-login-nav">🔐 تسجيل الدخول</button>
        <button id="navSubscribeBtn" class="btn-subscribe-nav">✨ اشتراك</button>
    </div>
</div>

<div id="loginPopup" class="login-popup">
    <div class="login-popup-content">
        <h3>🔐 تسجيل الدخول / إنشاء حساب</h3>
        <p>أدخل بريدك الإلكتروني وكلمة السر</p>
        <input type="email" id="popupEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="popupPassword" placeholder="كلمة السر">
        <button id="popupLoginBtn" class="btn-popup-login">دخول / إنشاء حساب</button>
        <br>
        <button id="closePopupBtn" class="btn-popup-close">إغلاق</button>
    </div>
</div>

<div id="home" class="page active home">
  <div class="card">
    <h1>Zertiva B2</h1>
    <p>أوثق منصة للتحضير لامتحان Telc B2</p>
    <button id="startBtn">لنبدأ 🚀</button>
  </div>
</div>

<div id="list" class="page">
  <div class="teile-header-section">
    <h3>📌 اختر القسم (Teil)</h3>
  </div>
  <div id="teileList" class="teile-row"></div>
  <div id="examsList" class="exams-container">
    <div class="welcome-message">
      👈 اختر القسم (Teil) من الأعلى لعرض الامتحانات
    </div>
  </div>
  <button id="backHomeBtn" class="back-home-btn">🏠 الرئيسية</button>
</div>

<div id="exam" class="page">
<div class="exam-box">
  
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <button id="backArrowFromExam" class="arrow-back-btn">↰</button>
    <h2 id="examTitle" style="margin: 0; flex: 1; text-align: center;"></h2>
    <div style="width: 40px;"></div>
  </div>

  <div id="examNavButtons" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">
    <button id="prevExamBtn" class="nav-exam-btn">◀ السابق</button>
    <button id="nextExamBtn" class="nav-exam-btn">التالي ▶</button>
  </div>

  <div id="teil1" style="display:none;"></div>
  <div id="teil2" style="display:none;"></div>
  <div id="teil3" style="display:none;"></div>
  <div id="sprach1" style="display:none;"></div>
  <div id="sprach2" style="display:none;"></div>
  <div id="hoeren1" style="display:none;"></div>
  <div id="hoeren2" style="display:none;"></div>
  <div id="hoeren3" style="display:none;"></div>
  <div id="schreiben" style="display:none;"></div>

  <div style="display: flex; justify-content: center; margin-top: 25px;">
    <button id="backToListBtn" class="back-list-btn">📋 عودة إلى القائمة</button>
  </div>
</div>
</div>

<div id="whatsappFloat" class="whatsapp-float">
    <span>💬</span>
</div>

<script src="helpSystem.js"></script>
<script src="engine.js"></script>
<script src="exams.js"></script>
<script src="auth.js"></script>
    <script>
// ========== نظام قفل الامتحانات المتأخر (يعمل على أي شيء في الصفحة) ==========
(async function() {
    // دالة معرفة حالة المستخدم
    async function getUserStatusFinal() {
        let email = localStorage.getItem('zertiva_email');
        if (!email) return 'guest';
        try {
            const response = await fetch('premium.json?_=' + Date.now());
            const premium = await response.json();
            if (premium[email]) {
                let expiry = premium[email];
                let today = new Date().toISOString().slice(0,10);
                if (today <= expiry) return 'premium';
            }
            return 'free';
        } catch(e) {
            return 'free';
        }
    }

    // دالة عرض نافذة القفل
    function showLockModal(examTitle) {
        let modal = document.createElement('div');
        modal.style.cssText = `
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 999999;
            display: flex; justify-content: center; align-items: center;
            direction: rtl;
        `;
        modal.innerHTML = `
            <div style="background: white; border-radius: 30px; padding: 30px; max-width: 350px; width: 85%; text-align: center;">
                <div style="font-size: 55px;">🔒</div>
                <h2 style="color: #2b5876;">محـتوى مقفل</h2>
                <p>المرجو ترقية الحساب للوصول لهذا المحتوى</p>
                <div style="background: #f3e8ff; padding: 10px; border-radius: 15px; margin: 15px 0;">
                    <span style="color: #a855f7;">📚 ${examTitle}</span>
                </div>
                <p style="color: #888;">يتطلب باقة: <strong style="color: #f39c12;">Pro</strong></p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                    <button id="upgradeModalBtn" style="background: #f39c12; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold;">🚀 ترقية الحساب الآن</button>
                    <button id="closeModalBtn" style="background: #ccc; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer;">ليس الآن</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('upgradeModalBtn')?.onclick = () => window.location.href = 'subscribe.html';
        document.getElementById('closeModalBtn')?.onclick = () => modal.remove();
        modal.onclick = (e) => { if(e.target === modal) modal.remove(); };
    }

    // دالة تطبيق القفل على كل الامتحانات
    async function applyFinalLock() {
        let status = await getUserStatusFinal();
        if (status === 'premium') return; // المستخدم مدفوع، كل شيء مفتوح
        
        // البحث عن جميع عناصر الامتحانات (أي عنصر يحتوي على رقم ثم نقطة)
        let allElements = document.querySelectorAll('#teil1 div, #teil2 div, #teil3 div, #sprach1 div, #sprach2 div, #hoeren1 div, #hoeren2 div, #hoeren3 div, #schreiben div');
        
        // أيضاً البحث في أي مكان آخر
        allElements = [...allElements, ...document.querySelectorAll('.exam-item, .fragen-item, [class*="exam"]')];
        
        allElements.forEach(el => {
            let text = el.innerText || el.textContent || '';
            // استخراج رقم الامتحان (مثل "1:", "2:", "3:"...)
            let match = text.match(/^(\d+)[:\.\-\s]/);
            let examNumber = match ? parseInt(match[1]) : null;
            
            // إذا كان رقم الامتحان موجود وأكبر من 1
            if (examNumber && examNumber > 1) {
                // تغيير الشكل
                el.style.backgroundColor = '#e9d5ff';
                el.style.border = '2px solid #a855f7';
                el.style.opacity = '0.65';
                el.style.filter = 'blur(1px)';
                el.style.cursor = 'pointer';
                el.style.position = 'relative';
                el.style.padding = '8px 12px';
                el.style.margin = '5px 0';
                el.style.borderRadius = '12px';
                
                // إضافة قفل
                if (!el.querySelector('.final-lock-icon')) {
                    let lock = document.createElement('span');
                    lock.className = 'final-lock-icon';
                    lock.innerHTML = ' 🔒';
                    lock.style.cssText = 'font-size: 16px; margin-right: 8px;';
                    el.appendChild(lock);
                }
                
                // إضافة علامة PRO
                if (!el.querySelector('.final-pro-badge')) {
                    let pro = document.createElement('span');
                    pro.className = 'final-pro-badge';
                    pro.innerHTML = ' PRO';
                    pro.style.cssText = 'background: #f39c12; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-right: 8px;';
                    el.appendChild(pro);
                }
                
                let examTitle = text.split('\n')[0].substring(0, 60);
                let oldClick = el.onclick;
                el.onclick = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    showLockModal(examTitle);
                    return false;
                };
            }
        });
    }

    // مراقبة الصفحة وتطبيق القفل بشكل مستمر
    let observer = new MutationObserver(() => {
        let listPage = document.getElementById('list');
        if (listPage && listPage.classList.contains('active')) {
            setTimeout(applyFinalLock, 200);
        }
    });
    observer.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] });
    
    // تطبيق القفل عند تحميل الصفحة
    setTimeout(applyFinalLock, 1000);
})();
</script>
</body>
</html>
